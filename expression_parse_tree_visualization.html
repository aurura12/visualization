<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>表达式解析树可视化</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --line: #e5e7eb;
      --accent: #3db3d8;
      --button-bg: #ffffff;
      --button-border: #d1d5db;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      --node: #ffffff;
      --node-active: #fed7aa;
      --node-filled: #e0f2fe;
      --node-eval: #dcfce7;
      --edge: #9ca3af;
      --edge-active: #f59e0b;
      --stack: #eff6ff;
      --token-current: #fef3c7;
      --token-done: #dcfce7;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      padding: 20px 24px 28px;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
    }

    .head {
      margin-bottom: 12px;
    }

    .head h1 {
      margin: 0;
      font-size: clamp(30px, 3.3vw, 42px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .head p {
      margin: 10px 0 0;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.45;
    }

    .rule {
      height: 1px;
      background: var(--line);
      margin: 18px 0 22px;
    }

    .info-card {
      position: relative;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 18px 22px 16px;
      margin-bottom: 18px;
    }

    .info-card::before {
      content: "";
      position: absolute;
      left: -1px;
      top: -1px;
      bottom: -1px;
      width: 4px;
      background: var(--accent);
    }

    .info-card h2 {
      margin: 0 0 8px;
      font-size: 19px;
      font-weight: 500;
    }

    .info-card p {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #1f2937;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1.2fr;
      gap: 16px;
      margin-bottom: 16px;
      align-items: start;
    }

    .control h3 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 400;
      text-align: center;
    }

    .control .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .button-stack {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 210px;
    }

    button,
    select,
    input[type="text"] {
      appearance: none;
      border: 1px solid var(--button-border);
      background: var(--button-bg);
      color: #2563eb;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 4px;
      box-shadow: var(--shadow);
      width: 100%;
    }

    input[type="text"] {
      color: #111827;
      font-weight: 500;
    }

    button {
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    button:hover,
    select:hover,
    input[type="text"]:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .slider-wrap,
    .select-wrap,
    .input-wrap {
      width: 100%;
      max-width: 240px;
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #f8b84e;
    }

    .slider-value,
    .select-value {
      font-size: 14px;
      font-weight: 700;
      color: #111827;
      font-variant-numeric: tabular-nums;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 4px 0 16px;
    }

    .stat {
      text-align: center;
      padding: 12px 10px 10px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .stat .label {
      font-size: 14px;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .token-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 16px;
    }

    .token-chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #334155;
      font-size: 12px;
      font-weight: 600;
    }

    .token-chip.current {
      background: var(--token-current);
      border-color: #f59e0b;
      color: #92400e;
    }

    .token-chip.done {
      background: var(--token-done);
      border-color: #16a34a;
      color: #166534;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 720px) minmax(260px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .plot-shell {
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 8px;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .side-panel {
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .side-panel h3 {
      margin: 0 0 10px;
      font-size: 17px;
      font-weight: 500;
    }

    .step-text,
    .result-box,
    .stack-box {
      font-size: 13px;
      line-height: 1.65;
      color: #1f2937;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .stack-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 30px;
      margin-top: 8px;
    }

    .stack-chip {
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--stack);
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 600;
    }

    .pseudo {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: #374151;
    }

    .pseudo-line {
      padding: 6px 8px;
      background: #f9fafb;
      border: 1px solid #eef2f7;
    }

    .pseudo-line.active {
      background: #fff7ed;
      border-color: #fdba74;
    }

    @media (max-width: 980px) {
      body { padding: 18px 16px 24px; }
      .controls,
      .stats,
      .main {
        grid-template-columns: 1fr;
      }
      .control h3 {
        text-align: left;
      }
      .control .content {
        align-items: stretch;
      }
      .button-stack,
      .slider-wrap,
      .select-wrap,
      .input-wrap {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="head">
      <h1>表达式解析树可视化</h1>
      <p>观察 token 如何驱动建树、栈如何追踪父节点，以及最终如何遍历和求值。</p>
    </header>

    <div class="rule"></div>

    <section class="info-card">
      <h2>说明</h2>
      <p>按照课件中的 `buildParseTree` 思路：遇到 `(` 就创建左孩子并向下，遇到运算符就写入当前节点并创建右孩子，遇到数字就写入数值并弹栈回到父节点，遇到 `)` 也弹栈返回。页面同时展示 token、父节点栈、树结构和遍历结果。</p>
    </section>

    <section class="controls">
      <div class="control">
        <h3>表达式</h3>
        <div class="content">
          <div class="input-wrap">
            <input id="expressionInput" type="text" value="( ( 7 + 3 ) * ( 5 - 2 ) )" />
          </div>
        </div>
      </div>

      <div class="control">
        <h3>示例</h3>
        <div class="content">
          <div class="select-wrap">
            <select id="exampleSelect">
              <option value="( ( 7 + 3 ) * ( 5 - 2 ) )">( ( 7 + 3 ) * ( 5 - 2 ) )</option>
              <option value="( ( 8 / 4 ) + ( 6 * 3 ) )">( ( 8 / 4 ) + ( 6 * 3 ) )</option>
              <option value="( ( ( 2 + 5 ) * 3 ) - ( 9 / 3 ) )">( ( ( 2 + 5 ) * 3 ) - ( 9 / 3 ) )</option>
            </select>
            <div id="exampleValue" class="select-value">示例 1</div>
          </div>
        </div>
      </div>

      <div class="control">
        <h3>每秒步数</h3>
        <div class="content">
          <div class="slider-wrap">
            <input id="speedInput" type="range" min="1" max="5" step="1" value="1" />
            <div id="speedValue" class="slider-value">1 步/秒</div>
          </div>
        </div>
      </div>

      <div class="control">
        <h3>操作</h3>
        <div class="content">
          <div class="button-stack">
            <button id="applyButton" type="button">应用表达式</button>
            <button id="toggleRunButton" type="button">开始</button>
            <button id="stepButton" type="button">单步</button>
            <button id="resetButton" type="button">重置</button>
          </div>
        </div>
      </div>
    </section>

    <section class="stats">
      <div class="stat">
        <div class="label">当前 token</div>
        <div id="tokenStat" class="value">-</div>
      </div>
      <div class="stat">
        <div class="label">栈深度</div>
        <div id="stackStat" class="value">0</div>
      </div>
      <div class="stat">
        <div class="label">节点数</div>
        <div id="nodeStat" class="value">1</div>
      </div>
      <div class="stat">
        <div class="label">求值结果</div>
        <div id="valueStat" class="value">-</div>
      </div>
    </section>

    <section id="tokenStrip" class="token-strip"></section>

    <section class="main">
      <div class="plot-shell">
        <svg id="treeSvg" viewBox="0 0 720 420" aria-label="parse tree"></svg>
      </div>

      <aside class="side-panel">
        <h3>过程说明</h3>
        <div id="stepText" class="step-text"></div>

        <div class="stack-box">
          <h3>父节点栈</h3>
          <div id="stackList" class="stack-list"></div>
        </div>

        <div class="result-box">
          <h3>遍历 / 求值</h3>
          <div id="resultText">尚未完成建树。</div>
        </div>

        <h3>伪代码提示</h3>
        <div id="pseudoList" class="pseudo"></div>
      </aside>
    </section>
  </main>

  <script>
    (() => {
      const pseudoLines = [
        "遇到 ( ：创建左孩子，当前节点入栈，下降到左孩子",
        "遇到运算符：写入当前节点，创建右孩子，当前节点入栈，下降到右孩子",
        "遇到数字：写入当前节点，弹栈回到父节点",
        "遇到 ) ：弹栈回到父节点"
      ];

      const expressionInput = document.getElementById("expressionInput");
      const exampleSelect = document.getElementById("exampleSelect");
      const exampleValue = document.getElementById("exampleValue");
      const speedInput = document.getElementById("speedInput");
      const speedValue = document.getElementById("speedValue");
      const applyButton = document.getElementById("applyButton");
      const toggleRunButton = document.getElementById("toggleRunButton");
      const stepButton = document.getElementById("stepButton");
      const resetButton = document.getElementById("resetButton");
      const tokenStat = document.getElementById("tokenStat");
      const stackStat = document.getElementById("stackStat");
      const nodeStat = document.getElementById("nodeStat");
      const valueStat = document.getElementById("valueStat");
      const tokenStrip = document.getElementById("tokenStrip");
      const treeSvg = document.getElementById("treeSvg");
      const stepText = document.getElementById("stepText");
      const stackList = document.getElementById("stackList");
      const resultText = document.getElementById("resultText");
      const pseudoList = document.getElementById("pseudoList");

      let nodeCounter = 0;

      function createNode() {
        nodeCounter += 1;
        return {
          id: `n${nodeCounter}`,
          value: "",
          left: null,
          right: null,
          x: 0,
          y: 0
        };
      }

      const state = {
        tokens: [],
        snapshots: [],
        index: 0,
        running: false,
        timer: null
      };

      function deepCloneNode(node) {
        if (!node) return null;
        return {
          id: node.id,
          value: node.value,
          x: node.x,
          y: node.y,
          left: deepCloneNode(node.left),
          right: deepCloneNode(node.right)
        };
      }

      function findNodeById(node, id) {
        if (!node) return null;
        if (node.id === id) return node;
        return findNodeById(node.left, id) || findNodeById(node.right, id);
      }

      function countNodes(node) {
        if (!node) return 0;
        return 1 + countNodes(node.left) + countNodes(node.right);
      }

      function inorder(node) {
        if (!node) return "";
        if (!node.left && !node.right) return String(node.value);
        return `( ${inorder(node.left)} ${node.value} ${inorder(node.right)} )`;
      }

      function postorder(node) {
        if (!node) return null;
        if (!node.left && !node.right) return Number(node.value);
        const left = postorder(node.left);
        const right = postorder(node.right);
        if (node.value === "+") return left + right;
        if (node.value === "-") return left - right;
        if (node.value === "*") return left * right;
        return left / right;
      }

      function preorder(node, out = []) {
        if (!node) return out;
        out.push(String(node.value || "□"));
        preorder(node.left, out);
        preorder(node.right, out);
        return out;
      }

      function buildSnapshots(tokens) {
        nodeCounter = 0;
        const root = createNode();
        const stack = [];
        let current = root;
        const snapshots = [];

        function takeSnapshot(step, token, message, activePseudo) {
          snapshots.push({
            step,
            token,
            message,
            activePseudo,
            root: deepCloneNode(root),
            currentId: current ? current.id : null,
            stackIds: stack.map((node) => node.id)
          });
        }

        takeSnapshot(0, null, "初始化空根节点，当前节点指向根。", 0);

        tokens.forEach((token, idx) => {
          if (token === "(") {
            current.left = createNode();
            stack.push(current);
            current = current.left;
            takeSnapshot(idx + 1, token, "读到左括号：创建左孩子，把当前节点入栈，并下降到左孩子。", 0);
          } else if (["+","-","*","/"].includes(token)) {
            current.value = token;
            current.right = createNode();
            stack.push(current);
            current = current.right;
            takeSnapshot(idx + 1, token, `读到运算符 ${token}：写入当前节点，创建右孩子，入栈并转到右孩子。`, 1);
          } else if (token === ")") {
            current = stack.pop() || current;
            takeSnapshot(idx + 1, token, "读到右括号：当前子树结束，弹栈返回父节点。", 3);
          } else {
            current.value = Number(token);
            current = stack.pop() || current;
            takeSnapshot(idx + 1, token, `读到数字 ${token}：写入当前节点，然后弹栈回到父节点。`, 2);
          }
        });

        takeSnapshot(tokens.length + 1, null, "建树完成，可以进行前序、中序、后序遍历和表达式求值。", 1);
        return snapshots;
      }

      function assignPositions(root) {
        let cursor = 0;
        function walk(node, depth) {
          if (!node) return;
          walk(node.left, depth + 1);
          node.x = 90 + cursor * 90;
          node.y = 70 + depth * 90;
          cursor += 1;
          walk(node.right, depth + 1);
        }
        walk(root, 0);
      }

      function currentSnapshot() {
        return state.snapshots[Math.min(state.index, state.snapshots.length - 1)];
      }

      function renderTokens(snapshot) {
        tokenStrip.innerHTML = "";
        state.tokens.forEach((token, index) => {
          const chip = document.createElement("span");
          chip.className = "token-chip";
          if (snapshot.step - 1 > index) chip.classList.add("done");
          if (snapshot.step - 1 === index) chip.classList.add("current");
          chip.textContent = token;
          tokenStrip.appendChild(chip);
        });
      }

      function renderStack(snapshot) {
        stackList.innerHTML = "";
        if (snapshot.stackIds.length === 0) {
          const empty = document.createElement("span");
          empty.className = "stack-chip";
          empty.textContent = "空";
          stackList.appendChild(empty);
          return;
        }
        snapshot.stackIds.forEach((id) => {
          const node = findNodeById(snapshot.root, id);
          const chip = document.createElement("span");
          chip.className = "stack-chip";
          chip.textContent = node ? (node.value === "" ? "□" : node.value) : id;
          stackList.appendChild(chip);
        });
      }

      function renderPseudo(snapshot) {
        pseudoList.innerHTML = "";
        pseudoLines.forEach((line, index) => {
          const el = document.createElement("div");
          el.className = "pseudo-line";
          if (index === snapshot.activePseudo) el.classList.add("active");
          el.textContent = line;
          pseudoList.appendChild(el);
        });
      }

      function renderResults(snapshot) {
        const latest = state.snapshots[state.snapshots.length - 1];
        const built = snapshot.step >= latest.step;
        if (!built) {
          resultText.textContent = "尚未完成建树。";
          valueStat.textContent = "-";
          return;
        }

        const tree = snapshot.root;
        const pre = preorder(tree, []).join(" ");
        const inText = inorder(tree);
        const value = postorder(tree);
        valueStat.textContent = String(value);
        resultText.innerHTML = `前序：${pre}<br>中序：${inText}<br>后序求值：${value}`;
      }

      function renderTree(snapshot) {
        treeSvg.innerHTML = "";
        const root = snapshot.root;
        assignPositions(root);

        function drawEdges(node) {
          if (!node) return;
          [[node.left, "L"], [node.right, "R"]].forEach(([child]) => {
            if (!child) return;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", node.x);
            line.setAttribute("y1", node.y);
            line.setAttribute("x2", child.x);
            line.setAttribute("y2", child.y);
            const active = snapshot.currentId === child.id || snapshot.currentId === node.id;
            line.setAttribute("stroke", active ? "#f59e0b" : "#9ca3af");
            line.setAttribute("stroke-width", active ? "4" : "2");
            treeSvg.appendChild(line);
            drawEdges(child);
          });
        }

        function drawNodes(node) {
          if (!node) return;
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          let fill = "#ffffff";
          let stroke = "#111827";
          let strokeWidth = 2;
          if (node.value !== "") {
            fill = "#e0f2fe";
            stroke = "#0284c7";
          }
          if (snapshot.currentId === node.id) {
            fill = "#fed7aa";
            stroke = "#c2410c";
            strokeWidth = 3;
          }
          if (snapshot.step >= state.snapshots.length - 1 && node.value !== "") {
            fill = "#dcfce7";
            stroke = "#16a34a";
          }
          circle.setAttribute("cx", node.x);
          circle.setAttribute("cy", node.y);
          circle.setAttribute("r", 24);
          circle.setAttribute("fill", fill);
          circle.setAttribute("stroke", stroke);
          circle.setAttribute("stroke-width", strokeWidth);
          treeSvg.appendChild(circle);

          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", node.x);
          text.setAttribute("y", node.y + 5);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-size", "16");
          text.setAttribute("font-weight", "700");
          text.setAttribute("fill", "#111827");
          text.textContent = node.value === "" ? "□" : String(node.value);
          treeSvg.appendChild(text);

          drawNodes(node.left);
          drawNodes(node.right);
        }

        drawEdges(root);
        drawNodes(root);
      }

      function render() {
        const snapshot = currentSnapshot();
        renderTokens(snapshot);
        renderTree(snapshot);
        renderStack(snapshot);
        renderPseudo(snapshot);
        renderResults(snapshot);

        tokenStat.textContent = snapshot.token === null ? "-" : String(snapshot.token);
        stackStat.textContent = String(snapshot.stackIds.length);
        nodeStat.textContent = String(countNodes(snapshot.root));
        stepText.textContent = snapshot.message;
        speedValue.textContent = `${speedInput.value} 步/秒`;
        exampleValue.textContent = `示例 ${exampleSelect.selectedIndex + 1}`;
        toggleRunButton.textContent = state.running ? "暂停" : "开始";
      }

      function stopTimer() {
        if (state.timer !== null) {
          clearTimeout(state.timer);
          state.timer = null;
        }
      }

      function advance() {
        if (state.index < state.snapshots.length - 1) {
          state.index += 1;
          render();
        } else {
          state.running = false;
          stopTimer();
          render();
        }
      }

      function scheduleNext() {
        stopTimer();
        if (!state.running) return;
        const delay = Math.max(180, Math.round(1000 / Number(speedInput.value)));
        state.timer = setTimeout(() => {
          advance();
          if (state.running) scheduleNext();
        }, delay);
      }

      function applyExpression() {
        const expr = expressionInput.value.trim();
        const tokens = expr.split(/\s+/).filter(Boolean);
        state.tokens = tokens;
        state.snapshots = buildSnapshots(tokens);
        state.index = 0;
        state.running = false;
        stopTimer();
        render();
      }

      exampleSelect.addEventListener("change", () => {
        expressionInput.value = exampleSelect.value;
        applyExpression();
      });

      applyButton.addEventListener("click", applyExpression);

      speedInput.addEventListener("input", () => {
        render();
        if (state.running) scheduleNext();
      });

      toggleRunButton.addEventListener("click", () => {
        if (state.index >= state.snapshots.length - 1) {
          state.index = 0;
        }
        state.running = !state.running;
        render();
        if (state.running) scheduleNext();
        else stopTimer();
      });

      stepButton.addEventListener("click", () => {
        state.running = false;
        stopTimer();
        advance();
      });

      resetButton.addEventListener("click", () => {
        state.index = 0;
        state.running = false;
        stopTimer();
        render();
      });

      applyExpression();
    })();
